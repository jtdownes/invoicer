<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Invoica</title>
  <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    * { box-sizing: border-box; }
    body { margin: 0; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }
    .paper { box-shadow: 0 0 0 1px rgba(0,0,0,.06), 0 4px 6px -1px rgba(0,0,0,.07), 0 12px 40px rgba(0,0,0,.06); }
    ::-webkit-scrollbar { width: 5px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 3px; }
    .nav-item { transition: background 0.12s, color 0.12s; }
    input, select, textarea { outline: none; }
    input:focus, select:focus, textarea:focus { border-color: #6366f1 !important; box-shadow: 0 0 0 3px rgba(99,102,241,.12); }
  </style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState } = React;

// ── Icons ─────────────────────────────────────────────────────────────────────

const Ic = ({ d, size = 18, cls = '' }) => (
  <svg width={size} height={size} viewBox="0 0 24 24" fill="none"
    stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"
    className={cls} dangerouslySetInnerHTML={{ __html: d }} />
);

const IC = {
  grid:     `<rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/>`,
  file:     `<path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/>`,
  users:    `<path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/>`,
  layout:   `<rect x="3" y="3" width="18" height="18" rx="2"/><line x1="3" y1="9" x2="21" y2="9"/><line x1="9" y1="21" x2="9" y2="9"/>`,
  settings: `<circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/>`,
  plus:     `<line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/>`,
  eye:      `<path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>`,
  eyeoff:   `<path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/>`,
  trash:    `<polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14H6L5 6"/><path d="M9 6V4h6v2"/>`,
  send:     `<line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/>`,
  back:     `<line x1="19" y1="12" x2="5" y2="12"/><polyline points="12 19 5 12 12 5"/>`,
  bell:     `<path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/>`,
  check:    `<polyline points="20 6 9 17 4 12"/>`,
  dollar:   `<line x1="12" y1="1" x2="12" y2="23"/><path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/>`,
};

// ── Helpers ───────────────────────────────────────────────────────────────────

const fmt = (n) => new Intl.NumberFormat('en-US', { style: 'currency', currency: 'USD' }).format(n);

const Badge = ({ status }) => {
  const S = {
    paid:        ['bg-emerald-50 text-emerald-700', 'bg-emerald-500', 'Paid'],
    outstanding: ['bg-amber-50 text-amber-700',     'bg-amber-400',   'Outstanding'],
    overdue:     ['bg-red-50 text-red-700',         'bg-red-500',     'Overdue'],
    draft:       ['bg-gray-100 text-gray-500',      'bg-gray-400',    'Draft'],
  }[status] || ['bg-gray-100 text-gray-500', 'bg-gray-400', status];
  return (
    <span className={`inline-flex items-center gap-1.5 px-2.5 py-1 rounded-full text-xs font-medium ${S[0]}`}>
      <span className={`w-1.5 h-1.5 rounded-full ${S[1]}`} />
      {S[2]}
    </span>
  );
};

// ── Mock Data ─────────────────────────────────────────────────────────────────

const CLIENTS = [
  { id: 1, name: 'Maplewood Properties',   email: 'accounts@maplewoodprop.com',  address: '142 Oak Street, Nashville, TN 37201' },
  { id: 2, name: 'Blue Ridge HVAC',         email: 'billing@blueridgehvac.com',   address: '88 Industrial Pkwy, Murfreesboro, TN 37129' },
  { id: 3, name: 'Sunrise Bakery',          email: 'jen@sunrisebakery.co',        address: '23 Main Street, Franklin, TN 37064' },
  { id: 4, name: 'Harlow & Sons Plumbing',  email: 'office@harlowplumbing.com',   address: '7 Commerce Drive, Smyrna, TN 37167' },
  { id: 5, name: 'Greenfield Landscape',    email: 'admin@greenfieldls.com',      address: '330 Valley Rd, Brentwood, TN 37027' },
];

const INVOICES = [
  { id: 'INV-0041', client: 'Maplewood Properties',  amount: 3200, issued: 'May 8',  due: 'Jun 7',  status: 'paid',        viewed: true,  viewedAt: 'May 9 · 9:14 am' },
  { id: 'INV-0042', client: 'Blue Ridge HVAC',        amount: 840,  issued: 'May 15', due: 'Jun 14', status: 'outstanding', viewed: true,  viewedAt: 'May 16 · 2:30 pm' },
  { id: 'INV-0043', client: 'Sunrise Bakery',         amount: 650,  issued: 'Apr 28', due: 'May 28', status: 'overdue',     viewed: false, viewedAt: null },
  { id: 'INV-0044', client: 'Harlow & Sons Plumbing', amount: 1200, issued: 'May 20', due: 'Jun 19', status: 'outstanding', viewed: false, viewedAt: null },
  { id: 'INV-0045', client: 'Greenfield Landscape',   amount: 430,  issued: 'May 23', due: 'Jun 22', status: 'draft',       viewed: false, viewedAt: null },
];

// ── Sidebar ───────────────────────────────────────────────────────────────────

const NAV = [
  { id: 'dashboard', label: 'Dashboard', icon: 'grid' },
  { id: 'invoices',  label: 'Invoices',  icon: 'file' },
  { id: 'clients',   label: 'Clients',   icon: 'users' },
  { id: 'templates', label: 'Templates', icon: 'layout' },
];

function Sidebar({ view, setView, onNewInvoice }) {
  return (
    <div style={{ width: 220 }} className="flex-shrink-0 bg-slate-900 flex flex-col h-screen">
      <div className="px-5 py-5 flex items-center gap-2.5">
        <div className="w-7 h-7 bg-indigo-500 rounded-lg flex items-center justify-center">
          <Ic d={IC.dollar} size={14} cls="text-white" />
        </div>
        <span className="text-white font-semibold text-sm tracking-tight">Invoica</span>
      </div>

      <div className="px-3 mb-4">
        <button onClick={onNewInvoice}
          className="w-full flex items-center justify-center gap-2 bg-indigo-600 hover:bg-indigo-500 text-white text-xs font-semibold py-2.5 px-3 rounded-lg transition-colors">
          <Ic d={IC.plus} size={14} />
          New Invoice
        </button>
      </div>

      <nav className="flex-1 px-2 space-y-0.5">
        {NAV.map(({ id, label, icon }) => {
          const active = view === id;
          return (
            <button key={id} onClick={() => setView(id)}
              className={`nav-item w-full flex items-center gap-3 px-3 py-2.5 rounded-lg text-xs font-medium text-left ${
                active ? 'bg-indigo-600 text-white' : 'text-slate-400 hover:text-white hover:bg-white/5'
              }`}>
              <Ic d={IC[icon]} size={16} />
              {label}
            </button>
          );
        })}
      </nav>

      <div className="px-2 pb-5">
        <button className="nav-item w-full flex items-center gap-3 px-3 py-2.5 rounded-lg text-xs font-medium text-slate-400 hover:text-white hover:bg-white/5">
          <Ic d={IC.settings} size={16} />
          Settings
        </button>
        <div className="mt-3 flex items-center gap-2.5 px-3 py-2">
          <div className="w-7 h-7 rounded-full bg-indigo-500 flex items-center justify-center text-white text-xs font-bold flex-shrink-0">JB</div>
          <div className="min-w-0">
            <div className="text-white text-xs font-medium truncate">Josh's Business</div>
            <div className="text-slate-400 text-xs">Pro Plan</div>
          </div>
        </div>
      </div>
    </div>
  );
}

// ── Dashboard ─────────────────────────────────────────────────────────────────

function StatCard({ label, value, sub, valueClass }) {
  return (
    <div className="bg-white rounded-xl border border-gray-200 p-5">
      <div className="text-xs text-gray-400 font-medium mb-1">{label}</div>
      <div className={`text-2xl font-bold mb-0.5 ${valueClass || 'text-gray-900'}`}>{value}</div>
      <div className="text-xs text-gray-400">{sub}</div>
    </div>
  );
}

function Dashboard({ onNewInvoice }) {
  const outstanding     = INVOICES.filter(i => i.status === 'outstanding');
  const overdue         = INVOICES.filter(i => i.status === 'overdue');
  const paid            = INVOICES.filter(i => i.status === 'paid');
  const totalBilled     = INVOICES.reduce((s, i) => s + i.amount, 0);
  const outstandingAmt  = outstanding.reduce((s, i) => s + i.amount, 0);
  const overdueAmt      = overdue.reduce((s, i) => s + i.amount, 0);
  const paidAmt         = paid.reduce((s, i) => s + i.amount, 0);

  return (
    <div className="flex-1 overflow-auto bg-gray-50">
      {/* Header */}
      <div className="flex items-center justify-between px-8 py-5 bg-white border-b border-gray-200 sticky top-0 z-10">
        <div>
          <h1 className="text-lg font-semibold text-gray-900">Dashboard</h1>
          <p className="text-xs text-gray-400 mt-0.5">Thursday, May 29, 2026</p>
        </div>
        <div className="flex items-center gap-3">
          <button className="relative p-2 rounded-lg hover:bg-gray-100 text-gray-400 transition-colors">
            <Ic d={IC.bell} size={18} />
            <span className="absolute top-2 right-2 w-1.5 h-1.5 bg-indigo-500 rounded-full" />
          </button>
          <button onClick={onNewInvoice}
            className="flex items-center gap-1.5 bg-indigo-600 hover:bg-indigo-500 text-white text-xs font-semibold py-2 px-4 rounded-lg transition-colors">
            <Ic d={IC.plus} size={14} />
            New Invoice
          </button>
        </div>
      </div>

      <div className="px-8 py-6 max-w-5xl">
        {/* Stats */}
        <div className="grid grid-cols-4 gap-4 mb-7">
          <StatCard label="Total Billed"    value={fmt(totalBilled)}    sub="All time"                          />
          <StatCard label="Outstanding"     value={fmt(outstandingAmt)} sub={`${outstanding.length} invoices`}  valueClass="text-amber-600" />
          <StatCard label="Overdue"         value={fmt(overdueAmt)}     sub="Action needed"                     valueClass="text-red-600" />
          <StatCard label="Paid This Month" value={fmt(paidAmt)}        sub="↑ 18% vs last month"               valueClass="text-emerald-600" />
        </div>

        {/* Invoices table */}
        <div className="bg-white rounded-xl border border-gray-200 overflow-hidden mb-5">
          <div className="flex items-center justify-between px-6 py-4 border-b border-gray-100">
            <h2 className="text-sm font-semibold text-gray-900">Recent Invoices</h2>
            <button className="text-xs text-indigo-600 hover:text-indigo-700 font-medium">View all</button>
          </div>
          <table className="w-full">
            <thead>
              <tr className="border-b border-gray-100">
                {['Invoice', 'Client', 'Amount', 'Status', 'Opened', 'Due', ''].map((h, i) => (
                  <th key={i} className="text-left text-xs font-medium text-gray-400 uppercase tracking-wide px-5 py-3">{h}</th>
                ))}
              </tr>
            </thead>
            <tbody>
              {INVOICES.map((inv, i) => (
                <tr key={inv.id} className={`hover:bg-gray-50 transition-colors ${i < INVOICES.length - 1 ? 'border-b border-gray-50' : ''}`}>
                  <td className="px-5 py-3.5 text-xs font-mono font-medium text-gray-700">{inv.id}</td>
                  <td className="px-5 py-3.5 text-sm text-gray-800">{inv.client}</td>
                  <td className="px-5 py-3.5 text-sm font-semibold text-gray-900">{fmt(inv.amount)}</td>
                  <td className="px-5 py-3.5"><Badge status={inv.status} /></td>
                  <td className="px-5 py-3.5">
                    {inv.viewed
                      ? <span className="flex items-center gap-1 text-xs text-emerald-600 font-medium"><Ic d={IC.eye} size={13} cls="text-emerald-500" />{inv.viewedAt}</span>
                      : <span className="flex items-center gap-1 text-xs text-gray-400"><Ic d={IC.eyeoff} size={13} />Not opened</span>
                    }
                  </td>
                  <td className="px-5 py-3.5 text-xs text-gray-500">{inv.due}</td>
                  <td className="px-5 py-3.5">
                    <button className="text-xs text-indigo-600 hover:text-indigo-700 font-medium">View</button>
                  </td>
                </tr>
              ))}
            </tbody>
          </table>
        </div>

        {/* Payout callout */}
        <div className="bg-gradient-to-r from-indigo-600 to-indigo-500 rounded-xl p-5 flex items-center justify-between">
          <div>
            <div className="text-white font-semibold text-sm">Connect your bank for direct payouts</div>
            <div className="text-indigo-200 text-xs mt-0.5">Free standard (2 days) · 1% instant — better than PayPal's 1.5% fee</div>
          </div>
          <button className="bg-white text-indigo-600 hover:bg-indigo-50 text-xs font-semibold py-2 px-4 rounded-lg transition-colors whitespace-nowrap">
            Connect Bank
          </button>
        </div>
      </div>
    </div>
  );
}

// ── Invoice Builder ────────────────────────────────────────────────────────────

const DEFAULT_ITEMS = [
  { id: 1, desc: 'Site prep & grading (8 hrs)',      qty: 1, rate: 850 },
  { id: 2, desc: 'Landscaping aggregate (bulk)',     qty: 3, rate: 120 },
  { id: 3, desc: 'Equipment rental — full day',      qty: 1, rate: 280 },
];

const PAYMENT_METHODS = [
  { key: 'card',   label: 'Credit / Debit Card',       sub: '2.9% + 30¢' },
  { key: 'paypal', label: 'PayPal',                    sub: '3.49% + 49¢' },
  { key: 'klarna', label: 'Klarna (Pay Later)',         sub: '3.29% + 30¢' },
  { key: 'affirm', label: 'Affirm (Financing)',         sub: 'Varies' },
];

function InvoiceBuilder({ onBack }) {
  const [clientId, setClientId] = useState(1);
  const [dueDate, setDueDate]   = useState('Jun 28, 2024');
  const [items, setItems]       = useState(DEFAULT_ITEMS);
  const [taxRate, setTaxRate]   = useState(9.25);
  const [notes, setNotes]       = useState('Payment due within 30 days. Thank you for your business!');
  const [methods, setMethods]   = useState({ card: true, paypal: true, klarna: false, affirm: false });
  const [nextId, setNextId]     = useState(4);

  const client   = CLIENTS.find(c => c.id === clientId);
  const subtotal = items.reduce((s, i) => s + i.qty * i.rate, 0);
  const tax      = subtotal * taxRate / 100;
  const total    = subtotal + tax;

  const addItem = () => {
    setItems([...items, { id: nextId, desc: '', qty: 1, rate: 0 }]);
    setNextId(nextId + 1);
  };
  const removeItem = (id) => setItems(items.filter(i => i.id !== id));
  const updateItem = (id, field, raw) => {
    const val = (field === 'qty' || field === 'rate') ? (parseFloat(raw) || 0) : raw;
    setItems(items.map(i => i.id === id ? { ...i, [field]: val } : i));
  };
  const toggle = (k) => setMethods({ ...methods, [k]: !methods[k] });

  const enabledMethods = PAYMENT_METHODS.filter(m => methods[m.key]).map(m => m.label);

  return (
    <div className="flex-1 flex flex-col h-screen overflow-hidden">
      {/* Top bar */}
      <div className="flex items-center gap-3 px-6 py-3.5 bg-white border-b border-gray-200 flex-shrink-0">
        <button onClick={onBack}
          className="flex items-center gap-1.5 text-xs text-gray-500 hover:text-gray-900 transition-colors font-medium">
          <Ic d={IC.back} size={14} /> Back
        </button>
        <span className="text-gray-300">|</span>
        <span className="text-xs text-gray-400">Dashboard</span>
        <span className="text-xs text-gray-300">›</span>
        <span className="text-xs font-semibold text-gray-700">New Invoice</span>
        <div className="ml-auto flex gap-2">
          <button className="px-4 py-2 text-xs font-semibold text-gray-600 bg-white border border-gray-300 rounded-lg hover:bg-gray-50 transition-colors">
            Save Draft
          </button>
          <button className="flex items-center gap-1.5 px-4 py-2 text-xs font-semibold text-white bg-indigo-600 rounded-lg hover:bg-indigo-500 transition-colors">
            <Ic d={IC.send} size={13} /> Send Invoice
          </button>
        </div>
      </div>

      {/* Split pane */}
      <div className="flex-1 flex overflow-hidden">

        {/* ── Form (left) ── */}
        <div className="w-[46%] flex-shrink-0 overflow-y-auto border-r border-gray-200 bg-white">
          <div className="p-7 space-y-6">

            {/* Bill To */}
            <div>
              <label className="block text-xs font-semibold text-gray-400 uppercase tracking-wider mb-2.5">Bill To</label>
              <select value={clientId} onChange={e => setClientId(Number(e.target.value))}
                className="w-full border border-gray-200 rounded-lg px-3 py-2.5 text-sm text-gray-900 bg-white">
                {CLIENTS.map(c => <option key={c.id} value={c.id}>{c.name}</option>)}
              </select>
              {client && (
                <div className="mt-2 text-xs text-gray-400 space-y-0.5 pl-1">
                  <div>{client.email}</div>
                  <div>{client.address}</div>
                </div>
              )}
            </div>

            {/* Invoice details */}
            <div>
              <label className="block text-xs font-semibold text-gray-400 uppercase tracking-wider mb-2.5">Invoice Details</label>
              <div className="grid grid-cols-3 gap-3">
                <div>
                  <div className="text-xs text-gray-400 mb-1.5">Invoice #</div>
                  <input value="INV-0046" readOnly
                    className="w-full border border-gray-200 rounded-lg px-3 py-2 text-xs text-gray-400 bg-gray-50" />
                </div>
                <div>
                  <div className="text-xs text-gray-400 mb-1.5">Issue Date</div>
                  <input value="May 29, 2024" readOnly
                    className="w-full border border-gray-200 rounded-lg px-3 py-2 text-xs text-gray-400 bg-gray-50" />
                </div>
                <div>
                  <div className="text-xs text-gray-400 mb-1.5">Due Date</div>
                  <input value={dueDate} onChange={e => setDueDate(e.target.value)}
                    className="w-full border border-gray-200 rounded-lg px-3 py-2 text-xs text-gray-800 transition-all" />
                </div>
              </div>
            </div>

            {/* Line items */}
            <div>
              <label className="block text-xs font-semibold text-gray-400 uppercase tracking-wider mb-2.5">Line Items</label>
              <div className="space-y-2">
                <div className="grid gap-2 text-xs text-gray-400 font-medium px-0.5"
                  style={{ gridTemplateColumns: '1fr 52px 84px 32px' }}>
                  <div>Description</div><div>Qty</div><div>Rate</div><div />
                </div>
                {items.map(item => (
                  <div key={item.id} className="grid gap-2 items-center"
                    style={{ gridTemplateColumns: '1fr 52px 84px 32px' }}>
                    <input value={item.desc} onChange={e => updateItem(item.id, 'desc', e.target.value)}
                      placeholder="Item description"
                      className="border border-gray-200 rounded-lg px-3 py-2 text-xs text-gray-800 w-full transition-all" />
                    <input type="number" value={item.qty} onChange={e => updateItem(item.id, 'qty', e.target.value)}
                      className="border border-gray-200 rounded-lg px-2 py-2 text-xs text-gray-800 text-center w-full transition-all" />
                    <input type="number" value={item.rate} onChange={e => updateItem(item.id, 'rate', e.target.value)}
                      className="border border-gray-200 rounded-lg px-3 py-2 text-xs text-gray-800 w-full transition-all" />
                    <button onClick={() => removeItem(item.id)}
                      className="flex items-center justify-center text-gray-300 hover:text-red-400 transition-colors h-8 w-8">
                      <Ic d={IC.trash} size={13} />
                    </button>
                  </div>
                ))}
              </div>
              <button onClick={addItem}
                className="mt-2.5 flex items-center gap-1.5 text-xs text-indigo-600 hover:text-indigo-700 font-semibold transition-colors">
                <Ic d={IC.plus} size={13} /> Add line item
              </button>
            </div>

            {/* Tax */}
            <div className="flex items-center justify-between">
              <label className="text-xs font-semibold text-gray-400 uppercase tracking-wider">Tax Rate</label>
              <div className="flex items-center gap-1.5">
                <input type="number" value={taxRate} onChange={e => setTaxRate(parseFloat(e.target.value) || 0)}
                  className="w-20 border border-gray-200 rounded-lg px-3 py-2 text-xs text-gray-800 text-right transition-all" />
                <span className="text-xs text-gray-400 font-medium">%</span>
              </div>
            </div>

            {/* Notes */}
            <div>
              <label className="block text-xs font-semibold text-gray-400 uppercase tracking-wider mb-2">Notes</label>
              <textarea value={notes} onChange={e => setNotes(e.target.value)} rows={3}
                className="w-full border border-gray-200 rounded-lg px-3 py-2.5 text-xs text-gray-700 resize-none transition-all" />
            </div>

            {/* Payment methods */}
            <div>
              <label className="block text-xs font-semibold text-gray-400 uppercase tracking-wider mb-2.5">Accept Payments Via</label>
              <div className="grid grid-cols-2 gap-2">
                {PAYMENT_METHODS.map(m => (
                  <button key={m.key} onClick={() => toggle(m.key)}
                    className={`flex items-center gap-2 p-3 rounded-lg border-2 text-left transition-all ${
                      methods[m.key] ? 'border-indigo-300 bg-indigo-50/60' : 'border-gray-200 bg-white hover:border-gray-300'
                    }`}>
                    <div className={`w-4 h-4 rounded flex-shrink-0 flex items-center justify-center ${
                      methods[m.key] ? 'bg-indigo-600' : 'border-2 border-gray-300 rounded'
                    }`}>
                      {methods[m.key] && <Ic d={IC.check} size={10} cls="text-white" />}
                    </div>
                    <div>
                      <div className="text-xs font-semibold text-gray-800 leading-tight">{m.label}</div>
                      <div className="text-xs text-gray-400">{m.sub}</div>
                    </div>
                  </button>
                ))}
              </div>
            </div>

          </div>
        </div>

        {/* ── Preview (right) ── */}
        <div className="flex-1 bg-gray-100 overflow-y-auto flex flex-col items-center pt-6 pb-10 px-6">
          <div className="text-xs text-gray-400 uppercase tracking-widest mb-4 font-medium">Live Preview</div>

          <div className="bg-white rounded-2xl paper w-full max-w-[560px] p-10">
            {/* Header */}
            <div className="flex justify-between items-start mb-8">
              <div>
                <div className="w-11 h-11 bg-indigo-100 rounded-xl flex items-center justify-center mb-3">
                  <span className="text-indigo-600 font-bold text-base">JB</span>
                </div>
                <div className="text-sm font-bold text-gray-900">Josh's Business</div>
                <div className="text-xs text-gray-400 mt-0.5">Nashville, TN 37201</div>
                <div className="text-xs text-gray-400">josh@joshsbusiness.com</div>
              </div>
              <div className="text-right">
                <div className="text-4xl font-black text-indigo-600 tracking-tight leading-none">INVOICE</div>
                <div className="text-sm text-gray-400 mt-2 font-mono">INV-0046</div>
              </div>
            </div>

            {/* Meta strip */}
            <div className="grid grid-cols-3 bg-gray-50 rounded-xl p-4 mb-6 gap-3">
              <div>
                <div className="text-xs text-gray-400 mb-0.5">Issue Date</div>
                <div className="text-xs font-semibold text-gray-700">May 29, 2024</div>
              </div>
              <div>
                <div className="text-xs text-gray-400 mb-0.5">Due Date</div>
                <div className="text-xs font-semibold text-gray-700">{dueDate}</div>
              </div>
              <div>
                <div className="text-xs text-gray-400 mb-0.5">Amount Due</div>
                <div className="text-sm font-bold text-indigo-600">{fmt(total)}</div>
              </div>
            </div>

            {/* Bill To */}
            <div className="mb-6">
              <div className="text-xs font-semibold text-gray-400 uppercase tracking-wider mb-1.5">Bill To</div>
              {client && <>
                <div className="text-sm font-semibold text-gray-900">{client.name}</div>
                <div className="text-xs text-gray-500 mt-0.5">{client.email}</div>
                <div className="text-xs text-gray-500">{client.address}</div>
              </>}
            </div>

            {/* Items table */}
            <table className="w-full text-xs mb-1">
              <thead>
                <tr className="border-b-2 border-gray-200">
                  <th className="text-left text-xs font-semibold text-gray-400 pb-2">Description</th>
                  <th className="text-center text-xs font-semibold text-gray-400 pb-2 w-10">Qty</th>
                  <th className="text-right text-xs font-semibold text-gray-400 pb-2 w-20">Rate</th>
                  <th className="text-right text-xs font-semibold text-gray-400 pb-2 w-20">Amount</th>
                </tr>
              </thead>
              <tbody>
                {items.map((item, i) => (
                  <tr key={item.id} className={i % 2 === 1 ? 'bg-gray-50' : ''}>
                    <td className="py-2.5 pr-3 text-gray-700">
                      {item.desc || <span className="text-gray-300 italic">—</span>}
                    </td>
                    <td className="py-2.5 text-center text-gray-600">{item.qty}</td>
                    <td className="py-2.5 text-right text-gray-600">{fmt(item.rate)}</td>
                    <td className="py-2.5 text-right font-semibold text-gray-800">{fmt(item.qty * item.rate)}</td>
                  </tr>
                ))}
              </tbody>
            </table>

            {/* Totals */}
            <div className="border-t border-gray-200 pt-3 mt-1 space-y-1.5">
              <div className="flex justify-between text-xs text-gray-500">
                <span>Subtotal</span><span>{fmt(subtotal)}</span>
              </div>
              <div className="flex justify-between text-xs text-gray-500">
                <span>Tax ({taxRate}%)</span><span>{fmt(tax)}</span>
              </div>
              <div className="flex justify-between text-sm font-bold text-gray-900 pt-2 border-t border-gray-200 mt-1">
                <span>Total Due</span>
                <span className="text-indigo-600">{fmt(total)}</span>
              </div>
            </div>

            {/* Notes */}
            {notes && (
              <div className="mt-5 pt-4 border-t border-gray-100 text-xs text-gray-400 leading-relaxed">
                {notes}
              </div>
            )}

            {/* Pay button */}
            <div className="mt-6">
              <button className="w-full bg-indigo-600 hover:bg-indigo-500 text-white font-bold py-3 rounded-xl text-sm transition-colors">
                Pay {fmt(total)}
              </button>
              {enabledMethods.length > 0 && (
                <div className="flex items-center justify-center flex-wrap gap-x-3 gap-y-1 mt-3">
                  {enabledMethods.map(m => (
                    <span key={m} className="text-xs text-gray-400">{m}</span>
                  ))}
                </div>
              )}
              <div className="text-center text-xs text-gray-300 mt-3">
                Secured by Invoica · Powered by Stripe
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
  );
}

// ── Placeholder for non-built views ───────────────────────────────────────────

function Placeholder({ label }) {
  return (
    <div className="flex-1 flex items-center justify-center bg-gray-50">
      <div className="text-center">
        <div className="text-4xl mb-3">🚧</div>
        <div className="text-sm font-semibold text-gray-400">{label} — coming in Phase 2</div>
      </div>
    </div>
  );
}

// ── App Root ──────────────────────────────────────────────────────────────────

function App() {
  const [view, setView]           = useState('dashboard');
  const [builderOpen, setBuilder] = useState(false);

  const handleSetView = (v) => { setView(v); setBuilder(false); };

  return (
    <div className="flex h-screen overflow-hidden bg-gray-50">
      <Sidebar view={builderOpen ? 'invoices' : view} setView={handleSetView} onNewInvoice={() => setBuilder(true)} />
      {builderOpen
        ? <InvoiceBuilder onBack={() => setBuilder(false)} />
        : view === 'dashboard' ? <Dashboard onNewInvoice={() => setBuilder(true)} />
        : <Placeholder label={view.charAt(0).toUpperCase() + view.slice(1)} />
      }
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
