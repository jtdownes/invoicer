/* ── Helpers ────────────────────────────────────────────────────────────── */
const fmt = n => new Intl.NumberFormat('en-US',{style:'currency',currency:'USD'}).format(n);

const Badge = ({ s }) => {
  const m = {paid:['bg-emerald-50 text-emerald-700','bg-emerald-500','Paid'],outstanding:['bg-amber-50 text-amber-700','bg-amber-400','Outstanding'],overdue:['bg-red-50 text-red-700','bg-red-500','Overdue'],draft:['bg-gray-100 text-gray-500','bg-gray-400','Draft']}[s]||['bg-gray-100 text-gray-500','bg-gray-400',s];
  return html`<span class="inline-flex items-center gap-1 px-2 py-0.5 rounded-full text-xs font-medium ${m[0]}"><span class="w-1.5 h-1.5 rounded-full ${m[1]}"/>${m[2]}</span>`;

/* ── Bottom nav (mobile) ────────────────────────────────────────────────── */

/* ── Dashboard ──────────────────────────────────────────────────────────── */
const Dashboard = ({ onNew }) => {
  const outstanding = INVOICES.filter(i=>i.status==='outstanding');
  const overdue     = INVOICES.filter(i=>i.status==='overdue');
  const paid        = INVOICES.filter(i=>i.status==='paid');
  const oAmt = outstanding.reduce((s,i)=>s+i.amt,0);
  const dAmt = overdue.reduce((s,i)=>s+i.amt,0);
  const pAmt = paid.reduce((s,i)=>s+i.amt,0);
  const tAmt = INVOICES.reduce((s,i)=>s+i.amt,0);

  return html`
    <div class="flex-1 overflow-auto pb-20 md:pb-0">
      <${MobileTopBar} title="Invoica" onNew=${onNew} />
      <${DesktopTopBar} title="Dashboard" subtitle="Thursday, May 29, 2026" onNew=${onNew} />

      <div class="md:hidden px-4 pt-4 pb-1">
        <div class="text-lg font-bold text-gray-900">Good morning, Josh</div>

            ['Overdue',         fmt(dAmt), 'Action needed',          'text-red-600'],
            ['Paid This Month', fmt(pAmt), '↑ 18% vs last month',    'text-emerald-600'],
          ].map(([label,value,sub,vc]) => html`
            <div key=${label} class="bg-white rounded-xl border border-gray-200 p-4">
              <div class="text-xs text-gray-400 font-medium mb-1">${label}</div>
              <div class="text-xl font-bold mb-0.5 leading-tight ${vc}">${value}</div>
              <div class="text-xs text-gray-400">${sub}</div>
            </div>`)}
        </div>

        <div class="bg-white rounded-xl border border-gray-200 overflow-hidden mb-4">
          <div class="flex items-center justify-between px-4 md:px-6 py-3.5 border-b border-gray-100">
            <h2 class="text-sm font-semibold text-gray-900">Recent Invoices</h2>
            <button class="text-xs text-indigo-600 font-medium">View all</button>

          <!-- Mobile cards -->
          <div class="md:hidden divide-y divide-gray-100">

                  </div>

          <!-- Desktop table -->

            <thead>
              <tr class="border-b border-gray-100">

            <tbody>

                  <td class="px-5 py-3.5 text-sm text-gray-800">${inv.client}</td>
                  <td class="px-5 py-3.5 text-sm font-semibold text-gray-900">${fmt(inv.amt)}</td>
                  <td class="px-5 py-3.5"><${Badge} s=${inv.status} /></td>
                  <td class="px-5 py-3.5">

/* ── Invoice Builder ────────────────────────────────────────────────────── */
const PAY_METHODS = [
  {k:'card',  label:'Credit / Debit Card', sub:'2.9% + 30¢'},
  {k:'paypal',label:'PayPal',              sub:'3.49% + 49¢'},
  {k:'klarna',label:'Klarna (Pay Later)',   sub:'3.29% + 30¢'},
  {k:'affirm',label:'Affirm (Financing)',   sub:'Varies'},
];

const InvoiceBuilder = ({ onBack }) => {
  const [clientId, setClientId] = useState(1);
  const [dueDate,  setDueDate]  = useState('Jun 28, 2024');
  const [items,    setItems]    = useState([
    {id:1,desc:'Site prep & grading (8 hrs)', qty:1,rate:850},
    {id:2,desc:'Landscaping aggregate (bulk)',qty:3,rate:120},
    {id:3,desc:'Equipment rental — full day', qty:1,rate:280},
  ]);
  const [taxRate, setTaxRate] = useState(9.25);
  const [notes,   setNotes]   = useState('Payment due within 30 days. Thank you for your business!');
  const [methods, setMethods] = useState({card:true,paypal:true,klarna:false,affirm:false});
  const [nextId,  setNextId]  = useState(4);
  const [tab,     setTab]     = useState('edit');

  const client   = CLIENTS.find(c=>c.id===clientId);
  const subtotal = items.reduce((s,i)=>s+i.qty*i.rate,0);
  const tax      = subtotal*taxRate/100;
  const total    = subtotal+tax;
  const enabled  = PAY_METHODS.filter(m=>methods[m.k]).map(m=>m.label);

  const addItem    = () => { setItems(it=>[...it,{id:nextId,desc:'',qty:1,rate:0}]); setNextId(n=>n+1); };
  const removeItem = id => setItems(it=>it.filter(i=>i.id!==id));
  const updItem    = (id,f,v) => setItems(it=>it.map(i=>i.id===id?{...i,[f]:(f==='qty'||f==='rate')?(parseFloat(v)||0):v}:i));
  const toggleM    = k => setMethods(m=>({...m,[k]:!m[k]}));

  const Form = html`
    <div class="space-y-6 p-4 md:p-7 overflow-y-auto flex-1">
      <div>
        <label class="block text-xs font-semibold text-gray-400 uppercase tracking-wider mb-2">Bill To</label>
        <select value=${clientId} onChange=${e=>setClientId(Number(e.target.value))}
          class="w-full border border-gray-200 rounded-xl px-3 py-3 text-sm text-gray-900 bg-white">
          ${CLIENTS.map(c=>html`<option key=${c.id} value=${c.id}>${c.name}</option>`)}
        </select>
        ${client && html`<div class="mt-2 text-xs text-gray-400 space-y-0.5 pl-1"><div>${client.email}</div><div>${client.addr}</div></div>`}
      </div>

      <div>
        <label class="block text-xs font-semibold text-gray-400 uppercase tracking-wider mb-2">Invoice Details</label>
        <div class="grid grid-cols-3 gap-2">
          <div><div class="text-xs text-gray-400 mb-1">Invoice #</div><input value="INV-0046" readOnly class="w-full border border-gray-200 rounded-xl px-3 py-2.5 text-sm text-gray-400 bg-gray-50"/></div>
          <div><div class="text-xs text-gray-400 mb-1">Issued</div><input value="May 29, 2024" readOnly class="w-full border border-gray-200 rounded-xl px-3 py-2.5 text-sm text-gray-400 bg-gray-50"/></div>
          <div>
            <div class="text-xs text-gray-400 mb-1">Due Date</div>
            <input value=${dueDate} onInput=${e=>setDueDate(e.target.value)} class="w-full border border-gray-200 rounded-xl px-3 py-2.5 text-sm text-gray-900"/>
          </div>
        </div>
      </div>

      <div>
        <label class="block text-xs font-semibold text-gray-400 uppercase tracking-wider mb-2">Line Items</label>
        <div class="space-y-2.5">
          ${items.map(item => html`
            <div key=${item.id} class="bg-gray-50 rounded-xl p-3 space-y-2">
              <input value=${item.desc} onInput=${e=>updItem(item.id,'desc',e.target.value)} placeholder="Item description"
                class="w-full border border-gray-200 rounded-lg px-3 py-2 text-sm text-gray-900 bg-white"/>
              <div class="flex gap-2 items-center">
                <div class="flex-1">
                  <div class="text-xs text-gray-400 mb-1">Qty</div>
                  <input type="number" value=${item.qty} onInput=${e=>updItem(item.id,'qty',e.target.value)}
                    class="w-full border border-gray-200 rounded-lg px-3 py-2 text-sm text-gray-900 bg-white text-center"/>
                </div>
                <div class="flex-1">
                  <div class="text-xs text-gray-400 mb-1">Rate ($)</div>
                  <input type="number" value=${item.rate} onInput=${e=>updItem(item.id,'rate',e.target.value)}
                    class="w-full border border-gray-200 rounded-lg px-3 py-2 text-sm text-gray-900 bg-white"/>
                </div>
                <div class="text-right pt-4">
                  <div class="text-sm font-semibold text-gray-900">${fmt(item.qty*item.rate)}</div>
                  <button onClick=${()=>removeItem(item.id)} class="text-gray-300 mt-1 p-1"><${Ic} n="trash" size=${14}/></button>
                </div>
              </div>
            </div>`)}
        </div>
        <button onClick=${addItem} class="mt-3 flex items-center gap-1.5 text-sm text-indigo-600 font-semibold py-2">
          <${Ic} n="plus" size=${15}/>Add line item
        </button>
      </div>

      <div class="flex items-center justify-between py-1">
        <label class="text-xs font-semibold text-gray-400 uppercase tracking-wider">Tax Rate</label>
        <div class="flex items-center gap-1.5">
          <input type="number" value=${taxRate} onInput=${e=>setTaxRate(parseFloat(e.target.value)||0)}
            class="w-20 border border-gray-200 rounded-xl px-3 py-2.5 text-sm text-gray-900 text-right"/>
          <span class="text-sm text-gray-400 font-medium">%</span>
        </div>
      </div>

      <div>
        <label class="block text-xs font-semibold text-gray-400 uppercase tracking-wider mb-2">Notes</label>
        <textarea onInput=${e=>setNotes(e.target.value)} rows="3"
          class="w-full border border-gray-200 rounded-xl px-3 py-2.5 text-sm text-gray-700 resize-none">${notes}</textarea>
      </div>

      <div>
        <label class="block text-xs font-semibold text-gray-400 uppercase tracking-wider mb-2">Accept Payments Via</label>
        <div class="grid grid-cols-2 gap-2">
          ${PAY_METHODS.map(m => html`
            <button key=${m.k} onClick=${()=>toggleM(m.k)}
              class="flex items-center gap-2 p-3 rounded-xl border-2 text-left transition-all ${methods[m.k]?'border-indigo-300 bg-indigo-50/60':'border-gray-200 bg-white'}">
              <div class="w-4 h-4 rounded flex-shrink-0 flex items-center justify-center ${methods[m.k]?'bg-indigo-600':'border-2 border-gray-300'}">
                ${methods[m.k] && html`<${Ic} n="check" size=${10} cls="text-white"/>`}
              </div>
              <div>
                <div class="text-xs font-semibold text-gray-800 leading-tight">${m.label}</div>
                <div class="text-xs text-gray-400">${m.sub}</div>
              </div>
            </button>`)}
        </div>
      </div>
    </div>`;

  const Preview = html`
    <div class="bg-gray-100 min-h-full flex items-start justify-center p-4 md:p-8 overflow-y-auto flex-1">
      <div class="w-full max-w-xl">
        <div class="hidden md:block text-xs text-gray-400 uppercase tracking-widest mb-4 text-center font-medium">Live Preview</div>
        <div class="bg-white rounded-2xl paper p-6 md:p-10">
          <div class="flex justify-between items-start mb-7">
            <div>
              <div class="w-10 h-10 bg-indigo-100 rounded-xl flex items-center justify-center mb-2.5">
                <span class="text-indigo-600 font-bold text-sm">JB</span>
              </div>
              <div class="text-sm font-bold text-gray-900">Josh's Business</div>
              <div class="text-xs text-gray-400 mt-0.5">Nashville, TN 37201</div>
              <div class="text-xs text-gray-400">josh@joshsbusiness.com</div>
            </div>
            <div class="text-right">
              <div class="text-3xl font-black text-indigo-600 leading-none">INVOICE</div>
              <div class="text-xs text-gray-400 mt-2 font-mono">INV-0046</div>
            </div>
          </div>
          <div class="grid grid-cols-3 bg-gray-50 rounded-xl p-3 mb-5 gap-2">
            <div><div class="text-xs text-gray-400 mb-0.5">Issued</div><div class="text-xs font-semibold text-gray-700">May 29, 2024</div></div>
            <div><div class="text-xs text-gray-400 mb-0.5">Due</div><div class="text-xs font-semibold text-gray-700">${dueDate}</div></div>
            <div><div class="text-xs text-gray-400 mb-0.5">Amount Due</div><div class="text-sm font-bold text-indigo-600">${fmt(total)}</div></div>
          </div>
          <div class="mb-5">
            <div class="text-xs font-semibold text-gray-400 uppercase tracking-wider mb-1.5">Bill To</div>
            ${client && html`<div>
              <div class="text-sm font-semibold text-gray-900">${client.name}</div>
              <div class="text-xs text-gray-500">${client.email}</div>
              <div class="text-xs text-gray-500">${client.addr}</div>
            </div>`}
          </div>
          <table class="w-full text-xs mb-1">
            <thead><tr class="border-b-2 border-gray-200">
              <th class="text-left text-xs font-semibold text-gray-400 pb-2">Description</th>
              <th class="text-center text-xs font-semibold text-gray-400 pb-2 w-10">Qty</th>
              <th class="text-right text-xs font-semibold text-gray-400 pb-2 w-20">Rate</th>
              <th class="text-right text-xs font-semibold text-gray-400 pb-2 w-20">Amt</th>
            </tr></thead>
            <tbody>
              ${items.map((item,i) => html`
                <tr key=${item.id} class=${i%2===1?'bg-gray-50':''}>
                  <td class="py-2 pr-2 text-gray-700">${item.desc||html`<span class="text-gray-300 italic">—</span>`}</td>
                  <td class="py-2 text-center text-gray-600">${item.qty}</td>
                  <td class="py-2 text-right text-gray-600">${fmt(item.rate)}</td>
                  <td class="py-2 text-right font-semibold text-gray-800">${fmt(item.qty*item.rate)}</td>
                </tr>`)}
            </tbody>
          </table>
          <div class="border-t border-gray-200 pt-3 mt-1 space-y-1.5">
            <div class="flex justify-between text-xs text-gray-500"><span>Subtotal</span><span>${fmt(subtotal)}</span></div>
            <div class="flex justify-between text-xs text-gray-500"><span>Tax (${taxRate}%)</span><span>${fmt(tax)}</span></div>
            <div class="flex justify-between text-sm font-bold text-gray-900 pt-2 border-t border-gray-200 mt-1">
              <span>Total Due</span><span class="text-indigo-600">${fmt(total)}</span>
            </div>
          </div>
          ${notes && html`<div class="mt-4 pt-3 border-t border-gray-100 text-xs text-gray-400 leading-relaxed">${notes}</div>`}
          <div class="mt-5">
            <button class="w-full bg-indigo-600 text-white font-bold py-3.5 rounded-xl text-sm">Pay ${fmt(total)}</button>
            ${enabled.length>0 && html`<div class="flex flex-wrap justify-center gap-x-3 gap-y-1 mt-2.5">
              ${enabled.map(m=>html`<span key=${m} class="text-xs text-gray-400">${m}</span>`)}
            </div>`}
            <div class="text-center text-xs text-gray-300 mt-2">Secured by Invoica · Powered by Stripe</div>
          </div>
        </div>
      </div>
    </div>`;

  return html`
    <div class="flex flex-col h-screen overflow-hidden">
      <div class="flex items-center gap-3 px-4 md:px-6 py-3.5 bg-white border-b border-gray-200 flex-shrink-0 sticky top-0 z-20">
        <button onClick=${onBack} class="flex items-center gap-1.5 text-sm text-gray-500 font-medium min-h-[44px] pr-2">
          <${Ic} n="back" size=${16}/>Back
        </button>
        <span class="text-gray-300 hidden md:block">|</span>
        <span class="text-sm font-semibold text-gray-800 flex-1">New Invoice</span>
        <div class="flex gap-2">
          <button class="px-3 py-2 text-xs font-semibold text-gray-600 bg-white border border-gray-300 rounded-lg min-h-[38px]">Draft</button>
          <button class="flex items-center gap-1.5 px-3 py-2 text-xs font-semibold text-white bg-indigo-600 rounded-lg min-h-[38px]">
            <${Ic} n="send" size=${13}/>Send
          </button>
        </div>
      </div>

      <div class="md:hidden flex border-b border-gray-200 bg-white flex-shrink-0">
        ${['edit','preview'].map(t => html`
          <button key=${t} onClick=${()=>setTab(t)}
            class="flex-1 py-3 text-sm font-semibold capitalize transition-colors ${tab===t?'border-b-2 border-indigo-600 text-indigo-600':'text-gray-400'}">
            ${t==='edit'?'Edit':'Preview'}
          </button>`)}
      </div>

      <div class="flex-1 flex overflow-hidden">
        <div class="${tab==='edit'?'flex':'hidden'} flex-col w-full md:flex md:w-[46%] md:border-r md:border-gray-200 bg-white overflow-y-auto">
          ${Form}
        </div>
        <div class="${tab==='preview'?'flex':'hidden'} flex-col flex-1 w-full md:flex overflow-y-auto">
          ${Preview}
        </div>
      </div>
    </div>`;
};

/* ── Placeholder ────────────────────────────────────────────────────────── */
const Placeholder = ({ label }) => html`
  <div class="flex-1 flex items-center justify-center h-full bg-gray-50 pb-20 md:pb-0">
    <div class="text-center px-8">
      <div class="text-4xl mb-3">🚧</div>
      <div class="text-sm font-semibold text-gray-400">${label} coming in Phase 2</div>
    </div>
  </div>`;

/* ── App root ────────────────────────────────────────────────────────────── */
const App = () => {
  const [view,    setView]    = useState('dashboard');
  const [builder, setBuilder] = useState(false);
  const go = v => { setView(v); setBuilder(false); };

  if (builder) return html`<${InvoiceBuilder} onBack=${()=>setBuilder(false)} />`;

  return html`
    <div class="flex h-screen overflow-hidden bg-gray-50">
      <${Sidebar} view=${view} setView=${go} onNew=${()=>setBuilder(true)} />
      <div class="flex-1 flex flex-col min-w-0 overflow-hidden">
        ${view==='dashboard'
          ? html`<${Dashboard} onNew=${()=>setBuilder(true)} />`
          : html`<${Placeholder} label=${view.charAt(0).toUpperCase()+view.slice(1)} />`}
        <${BottomNav} view=${view} setView=${go} onNew=${()=>setBuilder(true)} />
      </div>
    </div>`;
};

render(html`<${App} />`, document.getElementById('root'));
</script>
</body>
</html>
